<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>GENERATION MANDALA</title>
    <style>
        /* アストロノミコンの読み込み */
        @font-face {
            font-family: 'Astronomicon';
            src: url('./Astronomicon.ttf') format('truetype');
        }

        :root { --bg-color: #f0f0f0; --text-color: #333; --gray-line: #999; }
        body { background: var(--bg-color); color: var(--text-color); font-family: 'Helvetica Neue', Arial, sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        #main-container { display: flex; flex-grow: 1; overflow: hidden; }
        
        #ui-panel { width: 350px; padding: 20px; background: rgba(0,0,0,0.05); border-right: 1px solid #ccc; overflow-y: auto; }
        
        #canvas-container { flex-grow: 1; display: flex; justify-content: center; align-items: center; position: relative; }
        
        /* 世代ごとの入力欄 */
        .input-group { margin-bottom: 15px; padding: 10px; border-radius: 8px; border-left: 5px solid var(--ring-color); background: rgba(0,0,0,0.02); }
        input { background: #fff; border: 1px solid #ccc; color: #333; padding: 5px; border-radius: 4px; width: 100%; box-sizing: border-box; margin-top: 5px; }
        button { width: 100%; padding: 12px; background: #666; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        
        svg { max-width: 95vh; max-height: 95vh; }
        .zodiac-ring { stroke: var(--gray-line); stroke-width: 1; fill: none; }
        .zodiac-line { stroke: var(--gray-line); stroke-width: 1; }
        
        /* 星座記号：Astronomiconを使用。中心配置 */
        .zodiac-symbol { 
            font-family: 'Astronomicon'; 
            font-size: 20px; 
            pointer-events: none; 
        }

        /* 画面右下のタイトル */
        #page-title {
            position: absolute;
            bottom: 20px;
            right: 20px;
            font-family: serif;
            font-size: 0.9em;
            letter-spacing: 0.1em;
            color: #666;
        }
    </style>
</head>
<body>

<div id="main-container">
    <div id="ui-panel">
        <h2 style="font-weight:lighter; margin-top:0;">世代のバトン</h2>
        <p style="font-size: 0.8em; color: #666;">1822年〜2068年の星の響き</p>
        <div id="inputs"></div>
        <button onclick="draw()">計算・更新</button>
    </div>

    <div id="canvas-container">
        <svg id="mandala" viewBox="0 0 600 600">
            <g id="zodiac-base"></g>
            <g id="rings-container"></g>
        </svg>
        <div id="page-title">GENERATION MANDALA</div>
    </div>
</div>

<script>
    const COLORS = ["#8A2BE2", "#4B0082", "#0000FF", "#008000", "#FFFF00", "#FFA500", "#FF0000"];
    
    // サインとAstronomiconの対応文字 (A=牡羊座, B=牡牛座...)
    const SYMBOLS = ["A", "B", "C", "D", "E", "F", "G", "H", "I", "J", "K", "L"];
    // カラフルな星座の色 (手描きの図を参考に)
    const SYMBOL_COLORS = ["#FF4444", "#FFAA44", "#FFFF44", "#44FF44", "#44AAFF", "#AA44FF", "#FF44AA", "#FF4444", "#FFAA44", "#FFFF44", "#44FF44", "#44AAFF"];

    const inputContainer = document.getElementById('inputs');
    for (let i = 0; i < 7; i++) {
        const div = document.createElement('div');
        div.className = 'input-group';
        div.style.setProperty('--ring-color', COLORS[i]);
        div.innerHTML = `
            <label style="color:${COLORS[i]}">世代 ${i+1}</label>
            <input type="text" placeholder="名前" id="name-${i}">
            <input type="date" id="date-${i}" min="1822-01-01" max="2068-12-31">
        `;
        inputContainer.appendChild(div);
    }

    function initZodiac() {
        const base = document.getElementById('zodiac-base');
        
        // 中心にあるカラフルな星座用の小さな円
        const centerCircle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
        centerCircle.setAttribute("cx", 300); centerCircle.setAttribute("cy", 300); centerCircle.setAttribute("r", 50);
        centerCircle.className.baseVal = "zodiac-ring";
        base.appendChild(centerCircle);

        // メインの外円
        const outerCircle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
        outerCircle.setAttribute("cx", 300); outerCircle.setAttribute("cy", 300); outerCircle.setAttribute("r", 290);
        outerCircle.className.baseVal = "zodiac-ring";
        base.appendChild(outerCircle);

        // 起点を9時の位置（真左）にするため、角度を180度ずらす
        const START_ANGLE = 180;

        for (let i = 0; i < 12; i++) {
            const angle = START_ANGLE + (i * 30);
            const rad = (angle - 90) * Math.PI / 180;
            
            // カスプ（境界線）。ケーキカット構造
            const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
            line.setAttribute("x1", 300); // 中心からスタート
            line.setAttribute("y1", 300);
            line.setAttribute("x2", 300 + 290 * Math.cos(rad)); // 外円まで
            line.setAttribute("y2", 300 + 290 * Math.sin(rad));
            line.className.baseVal = "zodiac-line";
            base.appendChild(line);

            // 中心に近い位置に星座記号（Astronomicon）
            const textAngle = angle + 15; // 30度の真ん中に配置
            const textRad = (textAngle - 90) * Math.PI / 180;
            const tx = 300 + 35 * Math.cos(textRad); // 中心から35の距離
            const ty = 300 + 35 * Math.sin(textRad);
            
            const txt = document.createElementNS("http://www.w3.org/2000/svg", "text");
            txt.setAttribute("x", tx); txt.setAttribute("y", ty);
            txt.setAttribute("text-anchor", "middle");
            txt.setAttribute("dominant-baseline", "central");
            txt.setAttribute("fill", SYMBOL_COLORS[i]); // カラフルな色を設定
            txt.className.baseVal = "zodiac-symbol";
            txt.textContent = SYMBOLS[i];
            base.appendChild(txt);
        }
    }

    function draw() {
        const container = document.getElementById('rings-container');
        container.innerHTML = '';
        for (let i = 0; i < 7; i++) {
            const date = document.getElementById(`date-${i}`).value;
            if (!date) continue;
            // リングの範囲を中心の円の外側（50）から外円（290）の間に設定
            const radius = 60 + (i * 32); 
            const ring = document.createElementNS("http://www.w3.org/2000/svg", "circle");
            ring.setAttribute("cx", 300); ring.setAttribute("cy", 300); ring.setAttribute("r", radius);
            ring.setAttribute("stroke", COLORS[i]); ring.setAttribute("stroke-width", "1");
            ring.setAttribute("fill", "none"); ring.setAttribute("opacity", "0.5");
            container.appendChild(ring);
        }
    }
    initZodiac();
</script>
</body>
</html>
