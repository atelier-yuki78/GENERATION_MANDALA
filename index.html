<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>GENERATION MANDALA</title>
    <style>
        @font-face { 
            font-family: 'Astronomicon'; 
            /* 先ほどアップロードした場所（同じ階層）を指定しました */
            src: url('./Astronomicon.ttf') format('truetype'); 
        }
        :root { 
            --bg: #030508; --panel: #0d121d; --accent: #00d4ff; --text: #e0e6ed;
            --text-dim: #4a5a70; --border: #1a2230; --ring-base: #1e2a3a;
            --color-1: #bf7fff; --color-2: #7f7fff; --color-3: #00d4ff; 
            --color-4: #00ffa3; --color-5: #ffe57f; --color-6: #ff9f7f; --color-7: #ff7f9f;
        }
        body { margin: 0; font-family: sans-serif; background: var(--bg); color: var(--text); display: flex; height: 100vh; overflow: hidden; }
        #sidebar { width: 360px; background: var(--panel); border-right: 1px solid var(--border); overflow-y: auto; padding: 25px; z-index: 10; }
        .notice-text { font-size: 0.75rem; color: #ff9f7f; line-height: 1.6; margin: 15px 0; padding: 12px; border: 1px solid rgba(255,159,127,0.3); border-radius: 8px; }
        .gen-card { background: rgba(5,7,10,0.8); border: 1px solid var(--border); border-radius: 12px; padding: 18px; margin-bottom: 18px; position: relative; }
        .label { font-size: 0.7rem; color: var(--accent); margin-bottom: 4px; margin-top: 10px; display: block; }
        input { background: #05070a; border: 1px solid var(--border); color: var(--text); padding: 10px; border-radius: 6px; font-size: 0.85rem; width: 100%; box-sizing: border-box; color: white; }
        .time-row { display: flex; align-items: center; gap: 10px; margin-top: 2px; }
        .checkbox-row { display: flex; align-items: center; gap: 6px; font-size: 0.75rem; color: var(--text-dim); cursor: pointer; }
        .btn-calc { width: 100%; padding: 14px; background: var(--accent); color: #000; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 15px; font-size: 0.9rem; }
        .btn-add { width: 100%; padding: 10px; background: none; border: 1px dashed var(--accent); color: var(--accent); margin-bottom: 20px; border-radius: 8px; cursor: pointer; }
        .remove-btn { position: absolute; top: 15px; right: 15px; color: #ff4d4d; cursor: pointer; border: 1px solid #ff4d4d33; background: rgba(255,77,77,0.1); border-radius: 4px; padding: 2px 8px; font-size: 0.6rem; }
        #viewport { flex: 1; display: flex; justify-content: center; align-items: center; background: #000; }
        svg { width: 95%; height: 95%; max-width: 800px; }
        .astro-font { font-family: 'Astronomicon', sans-serif; }
        .sign-symbol { fill: #1e3a5f; font-size: 26px; }
        .planet-symbol { font-size: 20px; }
        .
